<!-- knoll2013 hero. Vault SVG style contract (palette + dark mode). -->
<svg width="100%" viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Knoll &amp; van Dick (2013) — Four Forms of Employee Silence</title>
<desc>On a Watts–Strogatz team network each employee chooses VOICE or silence; when silent, a 4-way motive (acquiescent · quiescent · prosocial · opportunistic) is drawn from a softmax over personal and climate features. Node colours show the prevailing motive across the team.</desc>
<style>
  .t  { font-family: -apple-system, "Helvetica Neue", "Hiragino Sans", sans-serif; font-size: 14px; fill: #2C2C2A; }
  .ts { font-family: -apple-system, "Helvetica Neue", "Hiragino Sans", sans-serif; font-size: 13px; fill: #444441; }
  .tl { font-family: -apple-system, "Helvetica Neue", "Hiragino Sans", sans-serif; font-size: 12px; font-weight: 600; fill: #534AB7; letter-spacing: 2px; }
  .title { font-family: -apple-system, "Helvetica Neue", "Hiragino Sans", sans-serif; font-size: 28px; font-weight: 600; fill: #2C2C2A; }
  .glab { font-family: -apple-system, "Helvetica Neue", "Hiragino Sans", sans-serif; font-size: 11px; font-weight: 500; fill: #888780; letter-spacing: 0.5px; }
  .edge  { stroke: #C7C5BD; stroke-width: 1.2; opacity: 0.75; }
  .chord { stroke: #534AB7; stroke-width: 1.2; opacity: 0.4; stroke-dasharray: 3 3; }
  .node  { stroke: #FAFAF8; stroke-width: 1.5; }
  .nAS { fill: #534AB7; }
  .nQS { fill: #4C97C9; }
  .nPS { fill: #0F6E56; }
  .nOS { fill: #F4A259; }
  .nVOICE { fill: #FAFAF8; stroke: #534AB7; stroke-width: 2.2; }
  @media (prefers-color-scheme: dark) {
    .t  { fill: #E5E5E2; }
    .ts { fill: #C7C5BD; }
    .tl { fill: #AFA9EC; }
    .title { fill: #E5E5E2; }
    .glab { fill: #8C8B85; }
    .edge  { stroke: #5F5E5A; }
    .chord { stroke: #AFA9EC; }
    .node  { stroke: #211F1C; }
    .nAS { fill: #AFA9EC; }
    .nQS { fill: #7FB8FF; }
    .nPS { fill: #5DCAA5; }
    .nOS { fill: #FFB86B; }
    .nVOICE { fill: #211F1C; stroke: #AFA9EC; }
  }
</style>

<!-- left: label + title -->
<text x="40" y="60" class="tl">GENERATIVE ABM · EMPLOYEE SILENCE</text>
<text x="40" y="96" class="title">Four Forms of</text>
<text x="40" y="128" class="title">Employee Silence</text>
<text x="40" y="162" class="ts">Knoll &amp; van Dick (2013)</text>
<text x="40" y="186" class="t">VOICE_i ~ Bernoulli( σ(β · x_i) )</text>
<text x="40" y="210" class="glab">motive ~ softmax over { AS · QS · PS · OS }</text>
<text x="40" y="234" class="glab">on a Watts–Strogatz team network</text>

<!-- right: Watts–Strogatz ring network, nodes coloured by silence motive -->
<g>
  <!-- ring lattice edges -->
  <line class="edge" x1="690.0" y1="60.0"  x2="737.5" y2="72.7"/>
  <line class="edge" x1="737.5" y1="72.7"  x2="772.3" y2="107.5"/>
  <line class="edge" x1="772.3" y1="107.5" x2="785.0" y2="155.0"/>
  <line class="edge" x1="785.0" y1="155.0" x2="772.3" y2="202.5"/>
  <line class="edge" x1="772.3" y1="202.5" x2="737.5" y2="237.3"/>
  <line class="edge" x1="737.5" y1="237.3" x2="690.0" y2="250.0"/>
  <line class="edge" x1="690.0" y1="250.0" x2="642.5" y2="237.3"/>
  <line class="edge" x1="642.5" y1="237.3" x2="607.7" y2="202.5"/>
  <line class="edge" x1="607.7" y1="202.5" x2="595.0" y2="155.0"/>
  <line class="edge" x1="595.0" y1="155.0" x2="607.7" y2="107.5"/>
  <line class="edge" x1="607.7" y1="107.5" x2="642.5" y2="72.7"/>
  <line class="edge" x1="642.5" y1="72.7"  x2="690.0" y2="60.0"/>

  <!-- rewired long-range chords (small-world shortcuts) -->
  <line class="chord" x1="737.5" y1="72.7"  x2="642.5" y2="237.3"/>
  <line class="chord" x1="772.3" y1="202.5" x2="607.7" y2="107.5"/>
  <line class="chord" x1="772.3" y1="107.5" x2="595.0" y2="155.0"/>
  <line class="chord" x1="690.0" y1="60.0"  x2="690.0" y2="250.0"/>

  <!-- nodes -->
  <circle class="node nAS"    cx="690.0" cy="60.0"  r="9"/>
  <circle class="node nQS"    cx="737.5" cy="72.7"  r="9"/>
  <circle class="node nPS"    cx="772.3" cy="107.5" r="9"/>
  <circle class="node nOS"    cx="785.0" cy="155.0" r="9"/>
  <circle class="nVOICE"      cx="772.3" cy="202.5" r="9"/>
  <circle class="node nAS"    cx="737.5" cy="237.3" r="9"/>
  <circle class="node nPS"    cx="690.0" cy="250.0" r="9"/>
  <circle class="node nQS"    cx="642.5" cy="237.3" r="9"/>
  <circle class="node nOS"    cx="607.7" cy="202.5" r="9"/>
  <circle class="node nAS"    cx="595.0" cy="155.0" r="9"/>
  <circle class="node nQS"    cx="607.7" cy="107.5" r="9"/>
  <circle class="node nPS"    cx="642.5" cy="72.7"  r="9"/>
</g>

<!-- legend -->
<g>
  <circle class="node nAS" cx="556" cy="282" r="5"/><text x="566" y="286" class="glab">AS</text>
  <circle class="node nQS" cx="600" cy="282" r="5"/><text x="610" y="286" class="glab">QS</text>
  <circle class="node nPS" cx="644" cy="282" r="5"/><text x="654" y="286" class="glab">PS</text>
  <circle class="node nOS" cx="688" cy="282" r="5"/><text x="698" y="286" class="glab">OS</text>
  <circle class="nVOICE"   cx="734" cy="282" r="5"/><text x="744" y="286" class="glab">VOICE</text>
</g>
</svg>
